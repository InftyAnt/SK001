<!doctype html>
<html lang = "ko">

<head>
	<meta charset = "utf-8" />
	<meta name = "viewport" content = "width=device-width, initial-scale=1" />
	
	<title>
		A
	</title>

	<script type = "importmap">
		{
			"imports": {
				"three" : "https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.module.js",
				"three/addons/" : "https://cdn.jsdelivr.net/npm/three@0.183.1/examples/jsm/"
			}
		}
	</script>
	
	<link rel = "stylesheet" href = "./style.css" />
</head>

<body>
	<div id = "ui-left" class = "side-ui left collapsed" aria-label = "Left UI">
		<div class = "panel-clip">
			<div class = "panel">
				<div class = "panel-header">
					<span class = "panel-title">
						Left
					</span>
				</div>
				
				<div class = "panel-body">
					
					<section class = "tab-content" data-tab = "layers" hidden>
						<div class = "section-title">
							Layer / Grid Style
						</div>
						
						<div class = "section-body">
							<div class = "layer-style">
								<div class = "layer-style-title">Layer Style</div>
								<label class = "layer-style-row">
									<span>Color</span>
									<input id = "layerColorInput" type = "color" value = "#404040" />
								</label>
								<label class = "layer-style-row">
									<span>Opacity</span>
									<input id = "layerOpacityInput" type = "range" min = "0" max = "1" step = "0.01" value = "0.00" />
									<span id = "layerOpacityValue" class = "layer-style-value">0.00</span>
								</label>
							</div>
							<div class = "layer-style">
								<div class = "layer-style-title">Grid Style</div>
								<label class = "layer-style-row">
									<span>Color</span>
									<input id = "gridColorInput" type = "color" value = "#575757" />
								</label>
								<label class = "layer-style-row">
									<span>Opacity</span>
									<input id = "gridOpacityInput" type = "range" min = "0" max = "1" step = "0.01" value = "0.32" />
									<span id = "gridOpacityValue" class = "layer-style-value">0.32</span>
								</label>
							</div>
						</div>
					</section>
					
					<section class = "tab-content" data-tab = "nets" hidden>
						<div class = "section-title">
							Groups / Nets
						</div>
						
						<div class = "section-body">
							<div id = "groupTree" class = "group-tree" aria-label = "Group and net visibility tree">
							</div>
						</div>
					</section>
					
					<section class = "tab-content" data-tab = "data" hidden>
						<div class = "section-title">
							Data
						</div>
						
						<div class = "section-body">
							<div class = "row" style = "gap : 8px; margin-bottom : 10px;">
								<button id = "dataPickBtn" class = "btn">
									텍스트 파일 추가
								</button>
								
							</div>
							
							<input
								id = "dataFileInput"
								type = "file"
								accept = ".txt,.log,.csv,text/plain"
								multiple
								hidden
							/>
							
							<div id = "dataDrop" class = "dropzone" role = "button" aria-label = "파일 드롭 영역">
								<div class = "dropzone-title">
									여기에 텍스트 파일을 드롭
								</div>
								
							</div>
							
							<div class = "scene-list-head">
								<span>
									Scenes
								</span>
								
							</div>
							
							<ul id = "sceneList" class = "scene-list">
							</ul>
						</div>
					</section>

				</div>
			</div>
		</div>
		
		<div class = "dock" role = "tablist" aria-label = "Left dock">
			<button class = "dock-btn toggle" data-action = "toggle" title = "접기/펴기" aria-label = "접기/펴기">
				≡
			</button>
			
			<button class = "dock-btn" data-tab = "layers" title = "Styles" aria-label = "Styles">
				<span class = "dock-icon">🎨</span>
			</button>

			<button class = "dock-btn" data-tab = "nets" title = "Nets" aria-label = "Nets">
				<span class = "dock-icon">🧩</span>
			</button>
			
			<button class = "dock-btn" data-tab = "data" title = "Data" aria-label = "Data">
				<span class = "dock-icon">📂</span>
			</button>
		</div>
	</div>
	
	<div id = "ui-right" class = "side-ui right" aria-label = "Right UI">
		<div class = "dock" role = "tablist" aria-label = "Right dock">
			<button class = "dock-btn toggle" data-action = "toggle" title = "접기/펴기" aria-label = "접기/펴기">
				≡
			</button>
			
			<button class = "dock-btn" data-tab = "zoom" title = "Zoom" aria-label = "Zoom">
				<span class = "dock-icon">🔍</span>
			</button>

			<button class = "dock-btn" data-tab = "camera" title = "Camera" aria-label = "Camera">
				<span class = "dock-icon">📷</span>
			</button>

			<button class = "dock-btn" data-tab = "settings" title = "Settings" aria-label = "Settings">
				<span class = "dock-icon">⚙️</span>
			</button>

			<button class = "dock-btn" data-tab = "inspect" title = "Inspect" aria-label = "Inspect">
				<span class = "dock-icon">🎯</span>
			</button>
		</div>
		
		<div class = "panel-clip">
			<div class = "panel">
				<div class = "panel-header">
					<span class = "panel-title">
						Right
					</span>
				</div>
				
				<div class = "panel-body">
					<section class = "tab-content" data-tab = "zoom">
						<div id = "ui-zoom" class = "zoom-card">
							<div class = "row">
								<span class = "label">
									Zoom
								</span>
								
								<span id = "zoomValue" class = "value">
									-
								</span>
							</div>
							
							<input id = "zoomSlider" type = "range" min = "0" max = "1000" value = "500" />
							
						</div>
					</section>

					<section class = "tab-content" data-tab = "camera" hidden>
						<div class = "section-title">
							Camera
						</div>

						<div class = "section-body">
							<div id = "cameraButtons" class = "camera-list" aria-label = "카메라 목록">
							</div>
							<div class = "camera-hint">
								Main 또는 Layer Top 카메라를 선택할 수 있습니다.
							</div>
						</div>
					</section>

					<section class = "tab-content" data-tab = "settings" hidden>
						<div class = "section-title">
							Settings
						</div>

						<div class = "section-body">
							<div class = "settings-card">
								<label class = "settings-row">
									<input id = "mainAutoRotateZ" type = "checkbox" />
									<span>Main Auto Rotate (Z)</span>
								</label>
							</div>

							<div class = "settings-card">
								<div class = "settings-title">Main Axis</div>
								<div class = "settings-grid">
									<label class = "settings-row"><input id = "axisMainAll" type = "checkbox" /><span>All</span></label>
									<label class = "settings-row"><input id = "axisMainX" type = "checkbox" /><span>X</span></label>
									<label class = "settings-row"><input id = "axisMainY" type = "checkbox" /><span>Y</span></label>
									<label class = "settings-row"><input id = "axisMainZ" type = "checkbox" /><span>Z</span></label>
								</div>
							</div>

							<div class = "settings-card">
								<div class = "settings-title">Top Axis</div>
								<div class = "settings-grid">
									<label class = "settings-row"><input id = "axisTopAll" type = "checkbox" /><span>All</span></label>
									<label class = "settings-row"><input id = "axisTopX" type = "checkbox" /><span>X</span></label>
									<label class = "settings-row"><input id = "axisTopY" type = "checkbox" /><span>Y</span></label>
									<label class = "settings-row"><input id = "axisTopZ" type = "checkbox" /><span>Z</span></label>
								</div>
							</div>
						</div>
					</section>

					<section class = "tab-content" data-tab = "inspect" hidden>
						<div class = "section-title">
							Net Inspect
						</div>

						<div class = "section-body">
							<div id = "netInfoPanel" class = "inspect-card" aria-live = "polite">
								아직 선택된 넷이 없습니다. 화면에서 넷 근처를 클릭하세요.
							</div>
						</div>
					</section>
				</div>
			</div>
		</div>
	</div>
	
	<div id = "crosshair" aria-hidden = "true">
	</div>
	
	<script type = "module" src = "./main.js">
	</script>
</body>

</html>
